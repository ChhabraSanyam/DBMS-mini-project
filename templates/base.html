<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Transport System</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }
        header { background-color: #333; color: #fff; padding: 1rem; text-align: center; }
        nav { background: #eee; padding: 0.5rem; text-align: center; }
        nav a { margin: 0 1rem; text-decoration: none; color: #333; font-weight: bold; }
        .container { padding: 2rem; max-width: 900px; margin: auto; background: white; min-height: 80vh; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .card-container { display: flex; gap: 1rem; justify-content: space-around; }
        .card { border: 1px solid #ccc; padding: 1.5rem; border-radius: 8px; flex: 1; text-align: center; }
        form { margin-top: 1rem; padding: 1rem; border: 1px solid #ddd; border-radius: 5px; }
        input, select, button { padding: 0.5rem; margin: 0.5rem 0; width: 100%; box-sizing: border-box; }
        button { background-color: #333; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <h1>School Transport Management</h1>
    </header>
    <nav>
        <a href="{{ url_for('index') }}">Dashboard</a>
        <a href="{{ url_for('routes') }}">Routes</a>
        <a href="{{ url_for('stops') }}">Bus Stops</a>
        <a href="{{ url_for('students') }}">Students</a>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
